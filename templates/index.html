<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思维导图AI助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>会话管理</h2>
                <button class="btn-icon" id="newSessionBtn" title="新建会话">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                </button>
            </div>
            <div class="session-list" id="sessionList">
            </div>
            <div class="sidebar-footer">
                <button class="btn-secondary" id="clearAllSessionsBtn">清空所有会话</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="toolbar">
                <button class="btn-icon" id="toggleSidebarBtn" title="切换侧边栏">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </button>
                <div class="toolbar-title">
                    <h1>思维导图AI助手</h1>
                </div>
                <div class="toolbar-actions">
                    <button class="btn-icon" id="createBranchBtn" title="创建分支">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                    </button>
                    <button class="btn-icon" id="exportBtn" title="导出思维导图">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                        </svg>
                    </button>
                    <button class="btn-icon" id="themeToggleBtn" title="切换主题">
                        <svg viewBox="0 0 24 24" width="20" height="20" class="icon-light">
                            <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
                        </svg>
                        <svg viewBox="0 0 24 24" width="20" height="20" class="icon-dark">
                            <path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="content-wrapper">
                <section class="mindmap-container" id="mindmapContainer">
                    <div id="mindmapCanvas"></div>
                    <div class="mindmap-controls">
                        <button class="btn-control" id="zoomInBtn" title="放大">+</button>
                        <button class="btn-control" id="zoomOutBtn" title="缩小">-</button>
                        <button class="btn-control" id="resetViewBtn" title="重置视图">⟲</button>
                    </div>
                    <div class="node-detail-modal" id="nodeDetailModal">
                        <div class="node-detail-content">
                            <div class="node-detail-header">
                                <span class="node-detail-role" id="nodeDetailRole"></span>
                                <button class="btn-icon node-detail-close" id="closeNodeDetail">&times;</button>
                            </div>
                            <div class="node-detail-body" id="nodeDetailBody"></div>
                        </div>
                    </div>
                </section>

                <section class="chat-panel" id="chatPanel">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message assistant">
                            <div class="message-avatar">AI</div>
                            <div class="message-content">
                                <p>你好！我是思维导图AI助手。你可以向我提问，我会将对话内容以思维导图的形式展示出来。</p>
                            </div>
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <textarea class="chat-input" id="chatInput" placeholder="输入你的问题..." rows="1"></textarea>
                        <button class="btn-primary" id="sendBtn">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div class="modal" id="exportModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>导出思维导图</h3>
                <button class="btn-icon modal-close" id="closeExportModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="export-options">
                    <button class="btn-secondary" id="exportPDF">导出为PDF</button>
                    <button class="btn-secondary" id="exportMM">导出为FreeMind(.mm)</button>
                    <button class="btn-secondary" id="exportJSON">导出为JSON</button>
                    <button class="btn-secondary" id="exportMarkdown">导出为Markdown</button>
                </div>
                <div class="export-divider"></div>
                <div class="import-section">
                    <h4>导入数据</h4>
                    <button class="btn-secondary" id="importJSON">从JSON文件导入</button>
                    <input type="file" id="importFileInput" accept=".json" style="display:none">
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
